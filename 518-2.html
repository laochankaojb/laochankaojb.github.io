<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5, viewport-fit=cover">
  <title>🌳🌸🚩 城市修復小能手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #d4f0d4 0%, #b8e4b0 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Quicksand', 'Segoe UI', 'Comic Sans MS', '幼圆', 'YouYuan', 'PingFang TC', sans-serif;
      padding: 10px;
      margin: 0;
      box-shadow: inset 0 0 30px rgba(140, 200, 120, 0.5);
      position: relative;
      overflow-x: hidden;
    }

    .game-container {
      width: 100%;
      max-width: 900px;
      background: rgba(255, 253, 240, 0.9);
      backdrop-filter: blur(18px);
      border-radius: 50px 50px 60px 60px;
      padding: 18px 20px 25px;
      box-shadow: 0 20px 35px rgba(90, 120, 40, 0.2), 0 8px 15px rgba(0,0,0,0.08), inset 0 3px 10px #f0ffe0;
      border: 3px solid #6da546;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: all 0.2s ease;
      position: relative;
      z-index: 2;
      height: auto;
      min-height: 95vh;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #3a5c1a;
      text-shadow: 2px 2px 0 #e5ffb3;
      background: #f6ffe7;
      padding: 5px 25px;
      border-radius: 60px;
      letter-spacing: 1px;
      margin-top: -5px;
      box-shadow: 0 8px 8px -5px rgba(80,120,20,0.25);
      display: flex;
      align-items: center;
      gap: 10px;
      border: 2px dashed #7fb03a;
    }

    .instruction {
      font-size: 1.6rem;
      font-weight: 700;
      background: #fafff0;
      padding: 8px 22px;
      border-radius: 50px;
      color: #436b1c;
      box-shadow: 0 6px 12px rgba(110, 150, 30, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 2px 0;
      border: 2px solid #b1d87a;
    }

    .source-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #dcf0c4;
      padding: 12px 25px;
      border-radius: 80px;
      box-shadow: inset 0 1px 10px #b1d68a, 0 10px 14px rgba(80,100,20,0.25);
      border: 2px solid #86af49;
    }

    .draggable-icon {
      font-size: 3.8rem;
      filter: drop-shadow(0 6px 4px rgba(0,0,0,0.15));
      cursor: grab;
      transition: transform 0.1s ease;
      background: white;
      padding: 12px 12px;
      border-radius: 50%;
      background: #ffffffdd;
      box-shadow: 0 5px 0 #7d9b4c, 0 8px 14px rgba(0,0,0,0.15);
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border: 3px solid #b1cf7c;
      touch-action: none;
    }

    .draggable-icon:active {
      cursor: grabbing;
      transform: scale(0.93);
      box-shadow: 0 3px 0 #5d7231, 0 6px 10px rgba(0,0,0,0.2);
    }

    .grid-row {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      background: #e2f0c9;
      padding: 14px 12px;
      border-radius: 60px;
      box-shadow: inset 0 3px 10px #9bb56b, 0 14px 18px rgba(70, 90, 10, 0.25);
      border: 3px solid #7fa33a;
      margin: 4px 0;
      width: 100%;
    }

    .slot {
      width: 62px;
      height: 72px;
      background: #fffef2;
      border: 3px dashed #b2ce7a;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      background: #fffcf2;
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.04), 0 4px 0 #8daa5b;
      transition: border 0.15s, box-shadow 0.15s, background 0.2s;
      cursor: pointer;
      position: relative;
    }

    .slot.drag-over {
      border: 4px solid #ff9f2f;
      box-shadow: 0 0 0 5px rgba(255, 180, 40, 0.7);
      background: #fff7e0;
      transform: scale(1.02);
    }

    .slot.filled {
      border-style: solid;
      border-color: #c2a34a;
      background: #fff9e6;
    }

    .slot.error-highlight {
      border: 4px solid #ff3a3a !important;
      background: #ffe0e0;
      box-shadow: 0 0 0 6px rgba(255, 70, 70, 0.5);
      animation: gentleShake 0.7s ease;
    }

    @keyframes gentleShake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }

    .slot span {
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .action-buttons {
      display: flex;
      gap: 18px;
      margin-top: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cute-btn {
      background: #f9b84a;
      border: none;
      font-size: 1.7rem;
      font-weight: bold;
      color: #4b2e15;
      padding: 12px 24px;
      border-radius: 50px;
      box-shadow: 0 7px 0 #b87a2e, 0 6px 14px rgba(140, 70, 0, 0.35);
      cursor: pointer;
      transition: 0.08s linear;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 2px solid #ffd58c;
      background: #fda74b;
      color: white;
      text-shadow: 1px 1px 0 #9b4d1c;
      letter-spacing: 0.5px;
    }

    .cute-btn:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #7b3e14, 0 6px 10px rgba(0,0,0,0.25);
    }

    .message-area {
      font-size: 1.5rem;
      font-weight: 700;
      background: #fef9e7;
      padding: 10px 22px;
      border-radius: 45px;
      color: #5b3f14;
      text-align: center;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #fef0d3;
      border: 2px solid #e5a43c;
      width: fit-content;
      margin: 3px auto;
    }

    #fireworksCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      display: none;
    }

    .congrats-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 200, 0.95);
      border-radius: 60px;
      padding: 22px 40px;
      font-size: 2.6rem;
      font-weight: bold;
      color: #d44c2f;
      text-align: center;
      z-index: 200;
      display: none;
      box-shadow: 0 16px 25px rgba(0,0,0,0.25);
      border: 4px solid #ffb703;
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      80% { transform: translate(-50%, -50%) scale(1.05); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    @media (max-width: 700px) {
      .slot {
        width: 52px;
        height: 62px;
        font-size: 2.2rem;
      }
      .draggable-icon {
        font-size: 3rem;
        width: 65px;
        height: 65px;
        padding: 8px;
      }
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
<canvas id="fireworksCanvas"></canvas>
<div class="congrats-overlay" id="congratsOverlay">🎉 恭喜！你完成所有關卡！ 🎉</div>

<div class="game-container">
  <h1>
    <span>🛠️</span> 城市修復小能手 <span>🏗️</span>
  </h1>

  <div class="instruction">
    ✨ 把圖案拖到格子，排成規律吧！ ✨
  </div>

  <div class="source-panel" id="sourceContainer"></div>

  <div class="grid-row" id="gridContainer"></div>

  <div class="action-buttons">
    <button class="cute-btn" id="checkBtn"><span>🔍</span> 檢查答案</button>
    <button class="cute-btn" id="clearBtn"><span>🧹</span> 清空格子</button>
  </div>

</div>

<script>
  (function() {
    const LEVELS = {
      1: { symbols: ['🌳', '🌲', '🌴'] },
      2: { symbols: ['🌸', '🌻', '🌺'] },
      3: { symbols: ['🚩', '🏁', '🏳️'] }
    };

    let currentLevel = 1;
    let gridValues = new Array(9).fill(null);
    let gameCompleted = false;

    const sourceContainer = document.getElementById('sourceContainer');
    const gridContainer = document.getElementById('gridContainer');
    const checkBtn = document.getElementById('checkBtn');
    const clearBtn = document.getElementById('clearBtn');
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    const congratsOverlay = document.getElementById('congratsOverlay');

    let fireworksActive = false;
    let animationId = null;

    function getCurrentSymbols() {
      return LEVELS[currentLevel].symbols;
    }

    function renderSourceIcons() {
      const symbols = getCurrentSymbols();
      sourceContainer.innerHTML = '';
      symbols.forEach((symbol) => {
        const iconDiv = document.createElement('div');
        iconDiv.className = 'draggable-icon';
        iconDiv.setAttribute('draggable', 'true');
        iconDiv.textContent = symbol;
        iconDiv.dataset.symbol = symbol;
        iconDiv.addEventListener('dragstart', handleDragStart);
        iconDiv.addEventListener('dragend', handleDragEnd);
        iconDiv.addEventListener('touchstart', handleTouchStart, {passive: false});
        iconDiv.addEventListener('touchmove', handleTouchMove, {passive: false});
        iconDiv.addEventListener('touchend', handleTouchEnd);
        sourceContainer.appendChild(iconDiv);
      });
    }

    function renderGrid() {
      gridContainer.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        if (gridValues[i] !== null) slot.classList.add('filled');
        slot.dataset.index = i;
        const span = document.createElement('span');
        span.textContent = gridValues[i] || '';
        slot.appendChild(span);
        slot.addEventListener('dragover', handleDragOver);
        slot.addEventListener('dragleave', handleDragLeave);
        slot.addEventListener('drop', handleDrop);
        slot.addEventListener('click', (e) => {
          if (gameCompleted) return;
          const idx = parseInt(e.currentTarget.dataset.index, 10);
          if (gridValues[idx] !== null) {
            gridValues[idx] = null;
            renderGrid();
            clearErrorHighlights();
            showTemporaryMessage('🐣 格子清空了，再試試看吧！');
          }
        });
        gridContainer.appendChild(slot);
      }
    }

    function clearErrorHighlights() {
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('error-highlight'));
    }

    function highlightErrorIndices(indices) {
      const slots = document.querySelectorAll('.slot');
      indices.forEach(idx => { if (slots[idx]) slots[idx].classList.add('error-highlight'); });
    }

    let messageTimeout = null;
    function showTemporaryMessage(text, isGood = true, duration = 1500) {
      // 由於已移除messageBox，改用按鈕上方短暫顯示或直接略過
      // 簡單建立一個浮動提示
      const existing = document.querySelector('.temp-message');
      if (existing) existing.remove();
      if (messageTimeout) clearTimeout(messageTimeout);
      
      const msg = document.createElement('div');
      msg.className = 'temp-message';
      msg.style.cssText = `
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: ${isGood ? '#fef0d3' : '#ffe0e0'};
        border: 2px solid ${isGood ? '#e5a43c' : '#ff3a3a'};
        border-radius: 40px;
        padding: 10px 24px;
        font-size: 1.4rem;
        font-weight: bold;
        color: #5b3f14;
        z-index: 300;
        box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        white-space: nowrap;
      `;
      msg.textContent = text;
      document.body.appendChild(msg);
      
      messageTimeout = setTimeout(() => {
        if (msg.parentNode) msg.remove();
      }, duration);
    }

    let draggedSymbol = null;
    function handleDragStart(e) {
      if (gameCompleted) return;
      draggedSymbol = e.target.dataset.symbol;
      e.dataTransfer.setData('text/plain', draggedSymbol);
      e.dataTransfer.effectAllowed = 'move';
      e.target.style.opacity = '0.6';
      clearErrorHighlights();
    }
    function handleDragEnd(e) { e.target.style.opacity = '1'; draggedSymbol = null; }
    function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
    function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    function handleDrop(e) {
      e.preventDefault();
      if (gameCompleted) return;
      const slot = e.currentTarget;
      slot.classList.remove('drag-over');
      const symbol = e.dataTransfer.getData('text/plain');
      if (!symbol) return;
      const index = parseInt(slot.dataset.index, 10);
      gridValues[index] = symbol;
      clearErrorHighlights();
      renderGrid();
      showTemporaryMessage('🐨 圖案放進去了！繼續加油～');
    }

    let touchSymbol = null, touchClone = null;
    function handleTouchStart(e) {
      if (gameCompleted) return;
      e.preventDefault();
      touchSymbol = e.currentTarget.dataset.symbol;
      const touch = e.touches[0];
      touchClone = e.currentTarget.cloneNode(true);
      touchClone.style.position = 'fixed';
      touchClone.style.zIndex = '9999';
      touchClone.style.pointerEvents = 'none';
      touchClone.style.opacity = '0.8';
      touchClone.style.width = '60px';
      touchClone.style.height = '60px';
      touchClone.style.fontSize = '2.8rem';
      document.body.appendChild(touchClone);
      moveClone(touch);
    }
    function moveClone(touch) {
      if (!touchClone) return;
      touchClone.style.left = (touch.clientX - 30) + 'px';
      touchClone.style.top = (touch.clientY - 30) + 'px';
    }
    function handleTouchMove(e) {
      e.preventDefault();
      if (!touchClone) return;
      const touch = e.touches[0];
      moveClone(touch);
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && el.classList.contains('slot')) el.classList.add('drag-over');
    }
    function handleTouchEnd(e) {
      e.preventDefault();
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));
      if (!touchClone || !touchSymbol) { cleanupTouch(); return; }
      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      if (target && target.classList.contains('slot') && !gameCompleted) {
        const index = parseInt(target.dataset.index, 10);
        gridValues[index] = touchSymbol;
        clearErrorHighlights();
        renderGrid();
        showTemporaryMessage('🐧 放上去了！好棒～');
      } else {
        showTemporaryMessage('🐣 把圖案拖到下面的格子裡喔！');
      }
      cleanupTouch();
    }
    function cleanupTouch() {
      if (touchClone && touchClone.parentNode) touchClone.parentNode.removeChild(touchClone);
      touchClone = null;
      touchSymbol = null;
    }
    document.addEventListener('touchcancel', cleanupTouch);

    function checkPattern() {
      if (gameCompleted) return;
      clearErrorHighlights();
      const symbols = getCurrentSymbols();
      const errorIndices = [];

      for (let i = 0; i < 9; i++) {
        if (gridValues[i] === null) errorIndices.push(i);
      }

      const firstThree = [gridValues[0], gridValues[1], gridValues[2]];
      const uniqueFirstThree = new Set(firstThree.filter(v => v !== null));
      if (uniqueFirstThree.size < 3) {
        [0,1,2].forEach(i => { if (!errorIndices.includes(i)) errorIndices.push(i); });
        let hint = '第1、2、3格要放三種不同的圖形喔！';
        if (gridValues[0] === null || gridValues[1] === null || gridValues[2] === null) {
          hint = '前三個格子不能留空，要放三種不同的圖形～';
        }
        showTemporaryMessage(`🌱 ${hint}`, false, 2000);
        highlightErrorIndices(errorIndices);
        return;
      }

      for (let i = 3; i < 9; i++) {
        if (gridValues[i] !== gridValues[i % 3]) {
          if (!errorIndices.includes(i)) errorIndices.push(i);
        }
      }

      if (errorIndices.length === 0) {
        if (currentLevel < 3) {
          showTemporaryMessage('🎉 答對了！準備進入下一關～', true, 1200);
          setTimeout(() => {
            switchLevel(currentLevel + 1);
          }, 700);
        } else {
          gameCompleted = true;
          showFireworksAndCongrats();
        }
      } else {
        const firstErr = errorIndices[0];
        let hint = '';
        if (gridValues[firstErr] === null) {
          hint = `第 ${firstErr+1} 格還沒有圖案喔！`;
        } else if (firstErr < 3) {
          hint = `第 ${firstErr+1} 格要放不同的圖形～`;
        } else {
          const ref = firstErr % 3;
          hint = `第 ${firstErr+1} 格要和第 ${ref+1} 格一樣喔！`;
        }
        showTemporaryMessage(`😲 再檢查一下～ ${hint}`, false, 2000);
        highlightErrorIndices(errorIndices);
      }
    }

    function clearGrid() {
      if (gameCompleted) return;
      gridValues = new Array(9).fill(null);
      clearErrorHighlights();
      renderGrid();
      showTemporaryMessage('🧸 格子都清空囉！重新排列吧～');
    }

    function switchLevel(level) {
      if (gameCompleted) return;
      currentLevel = level;
      gridValues = new Array(9).fill(null);
      clearErrorHighlights();
      renderSourceIcons();
      renderGrid();
      showTemporaryMessage(`🐶 第 ${level} 關！把正確順序排出來吧～`);
    }

    function showFireworksAndCongrats() {
      congratsOverlay.style.display = 'block';
      canvas.style.display = 'block';
      resizeCanvas();
      fireworksActive = true;
      startFireworks();
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => {
      if (fireworksActive) resizeCanvas();
    });

    function startFireworks() {
      let particles = [];
      const maxParticles = 100;
      function createBurst(x, y) {
        const count = 25 + Math.floor(Math.random() * 15);
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 4;
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            color: `hsl(${Math.random() * 360}, 80%, 60%)`
          });
        }
      }

      function animate() {
        if (!fireworksActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (Math.random() < 0.1 && particles.length < maxParticles) {
          createBurst(Math.random() * canvas.width, Math.random() * canvas.height * 0.6);
        }
        particles = particles.filter(p => p.life > 0.02);
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.05;
          p.life -= 0.012;
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        animationId = requestAnimationFrame(animate);
      }
      animate();
    }

    function stopFireworks() {
      fireworksActive = false;
      if (animationId) cancelAnimationFrame(animationId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.style.display = 'none';
      congratsOverlay.style.display = 'none';
    }

    checkBtn.addEventListener('click', checkPattern);
    clearBtn.addEventListener('click', clearGrid);

    window.addEventListener('dragover', (e) => e.preventDefault());
    window.addEventListener('drop', (e) => e.preventDefault());

    function initGame() {
      currentLevel = 1;
      gridValues = new Array(9).fill(null);
      gameCompleted = false;
      stopFireworks();
      renderSourceIcons();
      renderGrid();
    }

    initGame();
  })();
</script>
</body>
</html>
