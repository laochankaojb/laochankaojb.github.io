            background-position: center;
            filter: brightness(0.9);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);

            -webkit-backdrop-filter: blur(10px);
            border: 4px solid #FFD700;
            border-radius: 2rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B6B, #FFD93D);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover {
            transform: scale(1.05) translateY(-2px);
        }

        .timer-warning {
            color: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .judy-avatar {
            width: 120px;
            height: 120px;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .radar-chart {
            width: 100%;
            height: 300px;
        }

        .matching-item {
            cursor: pointer;
            transition: all 0.2s;
        }

        .matching-item.selected {
            border: 4px solid #3b82f6;
            transform: scale(1.05);
        }

                &lt;p class=&quot;text-2xl text-gray-700 mb-8&quot;&gt;你成功找回了寶石，打開了圖形之門！&lt;/p&gt;
                &lt;div class=&quot;text-4xl font-bold text-orange-500 mb-8&quot;&gt;最終得分: &lt;span id=&quot;final-score&quot;&gt;0&lt;/span&gt;&lt;/div&gt;
                &lt;button onclick=&quot;location.reload()&quot; class=&quot;btn-primary text-white text-2xl font-bold py-4 px-12 rounded-full&quot;&gt;
                    再玩一次
                &lt;/button&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;!-- Time Up Modal --&gt;
        &lt;div id=&quot;time-up-modal&quot; class=&quot;hidden absolute inset-0 z-[100] flex items-center justify-center bg-black/80&quot;&gt;
            &lt;div class=&quot;glass-panel p-10 text-center&quot;&gt;
                &lt;h2 class=&quot;text-4xl font-bold text-red-600 mb-4&quot;&gt;時間到！&lt;/h2&gt;
                &lt;p class=&quot;text-xl text-gray-700 mb-8&quot;&gt;闖關時間已到！期待下次繼續努力喔！&lt;/p&gt;
                &lt;button onclick=&quot;location.reload()&quot; class=&quot;btn-primary text-white text-xl font-bold py-3 px-10 rounded-full&quot;&gt;
                    重新開始
                &lt;/button&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;!-- Toast Notification --&gt;
        &lt;div id=&quot;toast&quot; class=&quot;hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[110] glass-panel px-8 py-4 text-2xl font-bold text-red-600 border-red-500&quot;&gt;
            &lt;!-- Toast message --&gt;

    &lt;audio id=&quot;audio-correct&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/juY3LTvKsB2mHmydwW84Ng.mp3&quot;&gt;&lt;/audio&gt;
    &lt;audio id=&quot;audio-wrong&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/w8A4CqHBtxCwbfkx43QJZf.mp3&quot;&gt;&lt;/audio&gt;
    &lt;audio id=&quot;audio-warning&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/eKPYnpEupAduodBhTiw97P.mp3&quot;&gt;&lt;/audio&gt;

    &lt;script&gt;
        const questions = [
            {
                type: 'tf', // 是非題
                category: '軸對稱',
                text: '蝴蝶的翅膀是軸對稱圖形嗎？',
                image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/7BYMkzs9cDnBJRXsZCbWH3.jpg',
                answer: true,
                explanation: '沒錯！蝴蝶左右兩邊是一模一樣的，對摺後可以重合。'
            },
            {
                type: 'tf',
                category: '旋轉',
                text: '電風扇葉片的運動是平移現象嗎？',
                answer: false,
                explanation: '不對喔，電風扇葉片是繞著中心點轉動的，屬於旋轉現象。'
            },
            {
                type: 'choice', // 選擇題
                category: '平移',
                text: '下列哪一個運動屬於平移現象？',
                options: ['拉開抽屜', '轉動方向盤', '盪鞦韆'],
                answer: 0,
                explanation: '正確！拉開抽屜是沿著直線移動，位置變了但形狀方向沒變。'
            },
            {
                type: 'choice',
                category: '旋轉',
                text: '鐘面上分針的運動是什麼現象？',
                image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/BjQxyW5Gg8ruXgwUHTwiuT.jpg',
                options: ['平移', '旋轉', '軸對稱'],
                answer: 1,
                explanation: '沒錯！分針繞著鐘面中心點轉動，是典型的旋轉現象。'
            },
            {
                type: 'visual', // 看圖判斷
                category: '平移',
                text: '這輛小汽車正在進行什麼運動？',
                image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/Ncmuz5yHKFXQUsAru74oWV.jpg',
                options: ['平移', '旋轉'],
                answer: 0,
                explanation: '正確！小汽車在直路上行駛是平移現象。'
            },
            {
                type: 'visual',
                category: '旋轉',
                text: '這個風車的運動是什麼現象？',
                image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/T74TgmZhjuRpgiTLm8SBZ6.jpg',
                options: ['平移', '旋轉'],
                answer: 1,
                explanation: '對了！風車葉片繞著軸心轉動是旋轉現象。'
            },
            {
                type: 'matching', // 配對題
                category: '軸對稱',
                text: '找出屬於左邊圖形對稱的另一半！',
                leftImg: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/7BYMkzs9cDnBJRXsZCbWH3.jpg',
                options: [
                    { id: 0, img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/7BYMkzs9cDnBJRXsZCbWH3.jpg', isCorrect: true },
                    { id: 1, img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/Ncmuz5yHKFXQUsAru74oWV.jpg', isCorrect: false }
                ],
                explanation: '太棒了！你找出了完美的對稱圖形！'
            },
            {
                type: 'matching',
                category: '軸對稱',
                text: '哪一個圖形是軸對稱圖形？',
                options: [
                    { id: 0, text: '字母 A', isCorrect: true },
                    { id: 1, text: '字母 F', isCorrect: false }
                ],
                explanation: '正確！字母 A 可以從中間對摺重合。'
            },
            {
                type: 'context', // 生活情境
                category: '平移',
                text: '朱迪警官搭乘升降機去辦公室，升降機的運動是？',
                options: ['平移', '旋轉'],
                answer: 0,
                explanation: '沒錯！升降機上下移動是平移現象。'
            },
            {
                type: 'context',
                category: '旋轉',
                text: '尼克在玩旋轉木馬，木馬的運動是？',
                options: ['平移', '旋轉'],
                answer: 1,
                explanation: '正確！旋轉木馬繞著中心轉動是旋轉現象。'
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let timeLeft = 600; // 10 minutes
        let timerInterval;
        let stats = { '軸對稱': 0, '平移': 0, '旋轉': 0 };
        let totalStats = { '軸對稱': 0, '平移': 0, '旋轉': 0 };

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-hud').classList.remove('hidden');
            document.getElementById('game-play').classList.remove('hidden');
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() =&gt; {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft === 120) { // 2 minutes
                    showToast(&quot;要把握時間闖關喔！&quot;);
                    document.getElementById('audio-warning').play();
                }
                if (timeLeft === 10) { // 10 seconds
                    showToast(&quot;最後10秒！加油！&quot;);
                    document.getElementById('timer-display').classList.add('timer-warning');
                }
                if (timeLeft &lt;= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('time-up-modal').classList.remove('hidden');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() =&gt; toast.classList.add('hidden'), 3000);
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const container = document.getElementById('question-card');
            document.getElementById('progress-text').innerText = `${currentIdx + 1}/10`;
            
            let html = `&lt;h2 class=&quot;text-2xl font-bold text-blue-700 mb-6&quot;&gt;${q.text}&lt;/h2&gt;`;
            
            if (q.image) {
                html += `&lt;img src=&quot;${q.image}&quot; class=&quot;w-48 h-48 object-contain mb-6 rounded-xl shadow-md&quot;&gt;`;
            }

            if (q.type === 'tf') {
                html += `
                    &lt;div class=&quot;flex space-x-6&quot;&gt;
                        &lt;button onclick=&quot;checkAnswer(true)&quot; class=&quot;btn-primary text-white px-10 py-3 rounded-xl text-xl&quot;&gt;正確&lt;/button&gt;
                        &lt;button onclick=&quot;checkAnswer(false)&quot; class=&quot;btn-primary text-white px-10 py-3 rounded-xl text-xl&quot;&gt;錯誤&lt;/button&gt;
                    &lt;/div&gt;
                `;
            } else if (q.type === 'choice' || q.type === 'visual' || q.type === 'context') {
                html += `&lt;div class=&quot;grid grid-cols-1 gap-4 w-full&quot;&gt;`;
                q.options.forEach((opt, i) =&gt; {
                    html += `&lt;button onclick=&quot;checkAnswer(${i})&quot; class=&quot;btn-primary text-white py-3 px-6 rounded-xl text-lg&quot;&gt;${opt}&lt;/button&gt;`;
                });
                html += `&lt;/div&gt;`;
            } else if (q.type === 'matching') {
                html += `&lt;div class=&quot;flex items-center justify-center space-x-10 mb-6&quot;&gt;`;
                if (q.leftImg) html += `&lt;div class=&quot;p-2 border-4 border-dashed border-gray-300 rounded-lg&quot;&gt;&lt;img src=&quot;${q.leftImg}&quot; class=&quot;w-32 h-32 object-contain opacity-50&quot;&gt;&lt;/div&gt;`;
                html += `&lt;div class=&quot;text-4xl&quot;&gt;➕&lt;/div&gt;`;
                html += `&lt;div class=&quot;grid grid-cols-2 gap-4&quot;&gt;`;
                q.options.forEach((opt, i) =&gt; {
                    const content = opt.img ? `&lt;img src=&quot;${opt.img}&quot; class=&quot;w-24 h-24 object-contain&quot;&gt;` : opt.text;
                    html += `&lt;button onclick=&quot;checkAnswer(${i})&quot; class=&quot;glass-panel p-4 hover:bg-blue-50 transition-colors&quot;&gt;${content}&lt;/button&gt;`;
                });
                html += `&lt;/div&gt;&lt;/div&gt;`;
            }

            container.innerHTML = html;
            
            // Update total stats for radar
            totalStats[q.category]++;
        }

        function checkAnswer(userAns) {
            const q = questions[currentIdx];
            let isCorrect = false;

            if (q.type === 'tf') isCorrect = userAns === q.answer;
            else if (q.type === 'matching') isCorrect = q.options[userAns].isCorrect;
            else isCorrect = userAns === q.answer;

            const feedbackOverlay = document.getElementById('feedback-overlay');
            const feedbackContent = document.getElementById('feedback-content');
            
            if (isCorrect) {
                score += 10;
                stats[q.category]++;
                document.getElementById('score-display').innerText = score;
                document.getElementById('audio-correct').play();
                feedbackContent.innerHTML = `
                    &lt;h3 class=&quot;text-4xl font-bold text-green-500 mb-4&quot;&gt;太棒了！&lt;/h3&gt;
                    &lt;p class=&quot;text-xl text-gray-700&quot;&gt;${q.explanation}&lt;/p&gt;
                `;
            } else {
                document.getElementById('audio-wrong').play();
                feedbackContent.innerHTML = `
                    &lt;h3 class=&quot;text-4xl font-bold text-orange-500 mb-4&quot;&gt;加油喔！&lt;/h3&gt;
                    &lt;p class=&quot;text-xl text-gray-700&quot;&gt;${q.explanation}&lt;/p&gt;
                `;
            }

            feedbackOverlay.classList.remove('hidden');
            anime({
                targets: '#feedback-content',
                scale: [0, 1],
                duration: 500,
                easing: 'easeOutBack'
            });

            setTimeout(() =&gt; {
                feedbackOverlay.classList.add('hidden');
                showAnalysis();
            }, 2500);
        }

        function showAnalysis() {
            document.getElementById('analysis-modal').classList.remove('hidden');
            const chartDom = document.getElementById('radar-chart');
            const myChart = echarts.init(chartDom);
            
            const option = {
                radar: {
                    indicator: [
                        { name: '軸對稱', max: totalStats['軸對稱'] || 1 },
                        { name: '平移', max: totalStats['平移'] || 1 },
                        { name: '旋轉', max: totalStats['旋轉'] || 1 }
                    ],
                    shape: 'circle',
                    splitNumber: 4,
                    axisName: { color: '#4b5563', fontWeight: 'bold' },
                    splitLine: { lineStyle: { color: '#e5e7eb' } },
                    splitArea: { areaStyle: { color: ['#f9fafb', '#f3f4f6'] } }
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: [stats['軸對稱'], stats['平移'], stats['旋轉']],
                        name: '能力分析',
                        areaStyle: { color: 'rgba(59, 130, 246, 0.3)' },
                        lineStyle: { color: '#3b82f6', width: 3 },
                        itemStyle: { color: '#3b82f6' }
                    }]
                }]
            };
            myChart.setOption(option);
        }

        function nextQuestion() {
            document.getElementById('analysis-modal').classList.add('hidden');
            currentIdx++;
            if (currentIdx &lt; questions.length) {
                renderQuestion();
            } else {
                showFinal();
            }
        }

        function showFinal() {
            clearInterval(timerInterval);
            document.getElementById('final-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
