<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>🌳🌸🚩 按規律排列小遊戲</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #d4f0d4 0%, #b8e4b0 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Quicksand', 'Segoe UI', 'Comic Sans MS', '幼圆', 'YouYuan', 'PingFang TC', sans-serif;
      padding: 20px;
      margin: 0;
      box-shadow: inset 0 0 50px rgba(140, 200, 120, 0.6);
      position: relative;
      overflow-x: hidden;
    }

    .game-container {
      width: 100%;
      max-width: 1000px;
      background: rgba(255, 253, 240, 0.9);
      backdrop-filter: blur(18px);
      border-radius: 80px 80px 90px 90px;
      padding: 30px 25px 40px;
      box-shadow: 0 30px 50px rgba(90, 120, 40, 0.25), 0 10px 20px rgba(0,0,0,0.1), inset 0 5px 15px #f0ffe0;
      border: 4px solid #6da546;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: all 0.2s ease;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #3a5c1a;
      text-shadow: 3px 3px 0 #e5ffb3;
      background: #f6ffe7;
      padding: 8px 35px;
      border-radius: 100px;
      letter-spacing: 2px;
      margin-top: -10px;
      box-shadow: 0 12px 10px -8px rgba(80,120,20,0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      border: 3px dashed #7fb03a;
    }

    .topic-badge {
      font-size: 2.5rem;
      background: #e6ffdb;
      padding: 8px 28px;
      border-radius: 60px;
      color: #2d5316;
      font-weight: 600;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      box-shadow: 0 6px 0 #8ab661;
      border: 2px solid #5b8c3f;
      background: #f0ffe0;
    }

    .instruction {
      font-size: 2.1rem;
      font-weight: 700;
      background: #fafff0;
      padding: 12px 30px;
      border-radius: 70px;
      color: #436b1c;
      box-shadow: 0 10px 20px rgba(110, 150, 30, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 5px 0 5px;
      border: 3px solid #b1d87a;
    }

    .level-selector {
      display: flex;
      gap: 18px;
      background: #c8e0a7;
      padding: 12px 30px;
      border-radius: 80px;
      box-shadow: 0 10px 0 #6b8c3d;
      margin-bottom: 5px;
    }

    .level-btn {
      font-size: 2.2rem;
      background: #f5ffe0;
      border: none;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      font-weight: bold;
      color: #3d5e1a;
      cursor: pointer;
      box-shadow: 0 6px 0 #688339, 0 8px 12px rgba(0,0,0,0.15);
      transition: all 0.08s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ebffd6;
      border: 3px solid #86af49;
      line-height: 1;
    }

    .level-btn.active {
      background: #7daa3a;
      color: white;
      box-shadow: 0 6px 0 #3e5716, 0 8px 16px #5b8122;
      transform: scale(1.08);
      border-color: #f5e56c;
      font-size: 2.4rem;
    }

    .source-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background: #dcf0c4;
      padding: 20px 35px;
      border-radius: 120px;
      box-shadow: inset 0 2px 15px #b1d68a, 0 14px 18px rgba(80,100,20,0.35);
      border: 3px solid #86af49;
    }

    .draggable-icon {
      font-size: 5.2rem;
      filter: drop-shadow(0 10px 6px rgba(0,0,0,0.2));
      cursor: grab;
      transition: transform 0.1s ease;
      background: white;
      padding: 16px 16px;
      border-radius: 50%;
      background: #ffffffdd;
      box-shadow: 0 8px 0 #7d9b4c, 0 12px 20px rgba(0,0,0,0.2);
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 105px;
      height: 105px;
      border: 4px solid #b1cf7c;
      touch-action: none;
    }

    .draggable-icon:active {
      cursor: grabbing;
      transform: scale(0.93);
      box-shadow: 0 4px 0 #5d7231, 0 8px 12px rgba(0,0,0,0.25);
    }

    .grid-row {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      background: #e2f0c9;
      padding: 20px 15px;
      border-radius: 100px;
      box-shadow: inset 0 4px 12px #9bb56b, 0 20px 25px rgba(70, 90, 10, 0.3);
      border: 4px solid #7fa33a;
      margin: 5px 0;
      width: 100%;
    }

    .slot {
      width: 80px;
      height: 90px;
      background: #fffef2;
      border: 4px dashed #b2ce7a;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.6rem;
      background: #fffcf2;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.05), 0 6px 0 #8daa5b;
      transition: border 0.15s, box-shadow 0.15s, background 0.2s;
      cursor: pointer;
      position: relative;
    }

    .slot.drag-over {
      border: 5px solid #ff9f2f;
      box-shadow: 0 0 0 7px rgba(255, 180, 40, 0.7);
      background: #fff7e0;
      transform: scale(1.03);
    }

    .slot.filled {
      border-style: solid;
      border-color: #c2a34a;
      background: #fff9e6;
    }

    .slot.error-highlight {
      border: 6px solid #ff3a3a !important;
      background: #ffe0e0;
      box-shadow: 0 0 0 8px rgba(255, 70, 70, 0.5);
      animation: gentleShake 0.7s ease;
    }

    @keyframes gentleShake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }

    .slot span {
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .action-buttons {
      display: flex;
      gap: 25px;
      margin-top: 5px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cute-btn {
      background: #f9b84a;
      border: none;
      font-size: 2.2rem;
      font-weight: bold;
      color: #4b2e15;
      padding: 18px 32px;
      border-radius: 70px;
      box-shadow: 0 10px 0 #b87a2e, 0 8px 20px rgba(140, 70, 0, 0.4);
      cursor: pointer;
      transition: 0.08s linear;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 3px solid #ffd58c;
      background: #fda74b;
      color: white;
      text-shadow: 2px 2px 0 #9b4d1c;
      letter-spacing: 1px;
    }

    .cute-btn:active {
      transform: translateY(5px);
      box-shadow: 0 4px 0 #7b3e14, 0 10px 15px rgba(0,0,0,0.3);
    }

    .message-area {
      font-size: 2rem;
      font-weight: 700;
      background: #fef9e7;
      padding: 15px 28px;
      border-radius: 60px;
      color: #5b3f14;
      text-align: center;
      min-height: 85px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #fef0d3;
      border: 3px solid #e5a43c;
      width: fit-content;
      margin: 5px auto;
    }

    /* 煙火畫布 */
    #fireworksCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      display: none;
    }

    .congrats-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 200, 0.95);
      border-radius: 80px;
      padding: 30px 50px;
      font-size: 3.5rem;
      font-weight: bold;
      color: #d44c2f;
      text-align: center;
      z-index: 200;
      display: none;
      box-shadow: 0 20px 30px rgba(0,0,0,0.3);
      border: 5px solid #ffb703;
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      80% { transform: translate(-50%, -50%) scale(1.1); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    @media (max-width: 650px) {
      .slot {
        width: 58px;
        height: 68px;
        font-size: 2.6rem;
      }
      .draggable-icon {
        font-size: 3.6rem;
        width: 80px;
        height: 80px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
<canvas id="fireworksCanvas"></canvas>
<div class="congrats-overlay" id="congratsOverlay">🎉 恭喜！你完成所有關卡！ 🎉</div>

<div class="game-container">
  <h1>
    <span>🌳</span> 規律小花園 <span>🌸</span>
  </h1>
  <div class="topic-badge" id="levelName">
    <!-- 只顯示圖案 -->
    <span>🌳</span><span>🌲</span><span>🌴</span>
  </div>

  <div class="instruction">
    ✨ 請把圖形拖到下面格子裡 ✨
  </div>

  <div class="level-selector">
    <button class="level-btn active" data-level="1">①</button>
    <button class="level-btn" data-level="2">②</button>
    <button class="level-btn" data-level="3">③</button>
  </div>

  <div class="source-panel" id="sourceContainer"></div>

  <div class="grid-row" id="gridContainer"></div>

  <div class="action-buttons">
    <button class="cute-btn" id="checkBtn"><span>🔍</span> 檢查答案</button>
    <button class="cute-btn" id="clearBtn"><span>🧹</span> 清空格子</button>
  </div>

  <div class="message-area" id="messageBox">
    <span>🐻</span> 把圖案拖進格子吧！ <span>🐼</span>
  </div>
</div>

<script>
  (function() {
    const LEVELS = {
      1: { symbols: ['🌳', '🌲', '🌴'] },
      2: { symbols: ['🌸', '🌻', '🌺'] },
      3: { symbols: ['🚩', '🏁', '🏳️'] }  // 已更換為白旗
    };

    let currentLevel = 1;
    let gridValues = new Array(9).fill(null);
    let gameCompleted = false; // 是否已全通關

    const sourceContainer = document.getElementById('sourceContainer');
    const gridContainer = document.getElementById('gridContainer');
    const levelButtons = document.querySelectorAll('.level-btn');
    const checkBtn = document.getElementById('checkBtn');
    const clearBtn = document.getElementById('clearBtn');
    const messageBox = document.getElementById('messageBox');
    const levelNameSpan = document.getElementById('levelName');
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    const congratsOverlay = document.getElementById('congratsOverlay');

    let fireworksActive = false;
    let animationId = null;

    function getCurrentSymbols() {
      return LEVELS[currentLevel].symbols;
    }

    // 更新頂部圖案 (不顯示文字)
    function updateLevelDisplay() {
      const emojis = getCurrentSymbols();
      levelNameSpan.innerHTML = `<span>${emojis[0]}</span><span>${emojis[1]}</span><span>${emojis[2]}</span>`;
    }

    function renderSourceIcons() {
      const symbols = getCurrentSymbols();
      sourceContainer.innerHTML = '';
      symbols.forEach((symbol) => {
        const iconDiv = document.createElement('div');
        iconDiv.className = 'draggable-icon';
        iconDiv.setAttribute('draggable', 'true');
        iconDiv.textContent = symbol;
        iconDiv.dataset.symbol = symbol;
        iconDiv.addEventListener('dragstart', handleDragStart);
        iconDiv.addEventListener('dragend', handleDragEnd);
        iconDiv.addEventListener('touchstart', handleTouchStart, {passive: false});
        iconDiv.addEventListener('touchmove', handleTouchMove, {passive: false});
        iconDiv.addEventListener('touchend', handleTouchEnd);
        sourceContainer.appendChild(iconDiv);
      });
    }

    function renderGrid() {
      gridContainer.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        if (gridValues[i] !== null) slot.classList.add('filled');
        slot.dataset.index = i;
        const span = document.createElement('span');
        span.textContent = gridValues[i] || '';
        slot.appendChild(span);
        slot.addEventListener('dragover', handleDragOver);
        slot.addEventListener('dragleave', handleDragLeave);
        slot.addEventListener('drop', handleDrop);
        slot.addEventListener('click', (e) => {
          if (gameCompleted) return;
          const idx = parseInt(e.currentTarget.dataset.index, 10);
          if (gridValues[idx] !== null) {
            gridValues[idx] = null;
            renderGrid();
            clearErrorHighlights();
            updateMessage('🐣 格子清空了，再試試看吧！');
          }
        });
        gridContainer.appendChild(slot);
      }
    }

    function clearErrorHighlights() {
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('error-highlight'));
    }

    function highlightErrorIndices(indices) {
      const slots = document.querySelectorAll('.slot');
      indices.forEach(idx => { if (slots[idx]) slots[idx].classList.add('error-highlight'); });
    }

    function updateMessage(text, isGood = true) {
      messageBox.innerHTML = `<span>${isGood ? '🌟' : '🐢'}</span> ${text} <span>${isGood ? '🎈' : '💧'}</span>`;
    }

    // 拖曳邏輯
    let draggedSymbol = null;
    function handleDragStart(e) {
      if (gameCompleted) return;
      draggedSymbol = e.target.dataset.symbol;
      e.dataTransfer.setData('text/plain', draggedSymbol);
      e.dataTransfer.effectAllowed = 'move';
      e.target.style.opacity = '0.6';
      clearErrorHighlights();
    }
    function handleDragEnd(e) { e.target.style.opacity = '1'; draggedSymbol = null; }
    function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
    function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    function handleDrop(e) {
      e.preventDefault();
      if (gameCompleted) return;
      const slot = e.currentTarget;
      slot.classList.remove('drag-over');
      const symbol = e.dataTransfer.getData('text/plain');
      if (!symbol) return;
      const index = parseInt(slot.dataset.index, 10);
      gridValues[index] = symbol;
      clearErrorHighlights();
      renderGrid();
      updateMessage('🐨 圖案放進去了！繼續加油～');
    }

    // 觸控拖曳
    let touchSymbol = null, touchClone = null;
    function handleTouchStart(e) {
      if (gameCompleted) return;
      e.preventDefault();
      touchSymbol = e.currentTarget.dataset.symbol;
      const touch = e.touches[0];
      touchClone = e.currentTarget.cloneNode(true);
      touchClone.style.position = 'fixed';
      touchClone.style.zIndex = '9999';
      touchClone.style.pointerEvents = 'none';
      touchClone.style.opacity = '0.8';
      touchClone.style.width = '75px';
      touchClone.style.height = '75px';
      touchClone.style.fontSize = '3.8rem';
      document.body.appendChild(touchClone);
      moveClone(touch);
    }
    function moveClone(touch) {
      if (!touchClone) return;
      touchClone.style.left = (touch.clientX - 37) + 'px';
      touchClone.style.top = (touch.clientY - 37) + 'px';
    }
    function handleTouchMove(e) {
      e.preventDefault();
      if (!touchClone) return;
      const touch = e.touches[0];
      moveClone(touch);
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && el.classList.contains('slot')) el.classList.add('drag-over');
    }
    function handleTouchEnd(e) {
      e.preventDefault();
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));
      if (!touchClone || !touchSymbol) { cleanupTouch(); return; }
      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      if (target && target.classList.contains('slot') && !gameCompleted) {
        const index = parseInt(target.dataset.index, 10);
        gridValues[index] = touchSymbol;
        clearErrorHighlights();
        renderGrid();
        updateMessage('🐧 放上去了！好棒～');
      } else {
        updateMessage('🐣 把圖案拖到下面的格子裡喔！');
      }
      cleanupTouch();
    }
    function cleanupTouch() {
      if (touchClone && touchClone.parentNode) touchClone.parentNode.removeChild(touchClone);
      touchClone = null;
      touchSymbol = null;
    }
    document.addEventListener('touchcancel', cleanupTouch);

    // 檢查規律，含自動晉級與通關煙火
    function checkPattern() {
      if (gameCompleted) return;
      clearErrorHighlights();
      const symbols = getCurrentSymbols();
      const errorIndices = [];

      for (let i = 0; i < 9; i++) {
        if (gridValues[i] === null) errorIndices.push(i);
      }

      const firstThree = [gridValues[0], gridValues[1], gridValues[2]];
      const uniqueFirstThree = new Set(firstThree.filter(v => v !== null));
      if (uniqueFirstThree.size < 3) {
        [0,1,2].forEach(i => { if (!errorIndices.includes(i)) errorIndices.push(i); });
        let hint = '第1、2、3格要放三種不同的圖形喔！';
        if (gridValues[0] === null || gridValues[1] === null || gridValues[2] === null) {
          hint = '前三個格子不能留空，要放三種不同的圖形～';
        }
        updateMessage(`🌱 ${hint}`, false);
        highlightErrorIndices(errorIndices);
        return;
      }

      for (let i = 3; i < 9; i++) {
        if (gridValues[i] !== gridValues[i % 3]) {
          if (!errorIndices.includes(i)) errorIndices.push(i);
        }
      }

      if (errorIndices.length === 0) {
        // 正確！
        if (currentLevel < 3) {
          updateMessage('🎉 答對了！準備進入下一關～', true);
          // 延遲一下自動跳轉
          setTimeout(() => {
            switchLevel(currentLevel + 1);
          }, 800);
        } else {
          // 第三關完成，顯示煙火與恭喜
          gameCompleted = true;
          updateMessage('🎊 全部關卡完成！你太厲害了！ 🎊', true);
          showFireworksAndCongrats();
        }
      } else {
        const firstErr = errorIndices[0];
        let hint = '';
        if (gridValues[firstErr] === null) {
          hint = `第 ${firstErr+1} 格還沒有圖案喔！`;
        } else if (firstErr < 3) {
          hint = `第 ${firstErr+1} 格要放不同的圖形～`;
        } else {
          const ref = firstErr % 3;
          hint = `第 ${firstErr+1} 格要和第 ${ref+1} 格一樣喔！`;
        }
        updateMessage(`😲 再檢查一下～ ${hint}`, false);
        highlightErrorIndices(errorIndices);
      }
    }

    function clearGrid() {
      if (gameCompleted) return;
      gridValues = new Array(9).fill(null);
      clearErrorHighlights();
      renderGrid();
      updateMessage('🧸 格子都清空囉！重新排列吧～');
    }

    function switchLevel(level) {
      if (gameCompleted) return;
      currentLevel = level;
      gridValues = new Array(9).fill(null);
      clearErrorHighlights();
      renderSourceIcons();
      renderGrid();
      updateLevelDisplay();
      updateMessage(`🐶 第 ${level} 關！把正確順序排出來吧～`);
      levelButtons.forEach(btn => {
        const btnLevel = parseInt(btn.dataset.level, 10);
        btn.classList.toggle('active', btnLevel === level);
      });
    }

    // 煙火動畫
    function showFireworksAndCongrats() {
      congratsOverlay.style.display = 'block';
      canvas.style.display = 'block';
      resizeCanvas();
      fireworksActive = true;
      startFireworks();
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => {
      if (fireworksActive) resizeCanvas();
    });

    function startFireworks() {
      let particles = [];
      const maxParticles = 120;
      function createBurst(x, y) {
        const count = 30 + Math.floor(Math.random() * 20);
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 5;
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            color: `hsl(${Math.random() * 360}, 80%, 60%)`
          });
        }
      }

      function animate() {
        if (!fireworksActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // 隨機產生煙火
        if (Math.random() < 0.12 && particles.length < maxParticles) {
          createBurst(Math.random() * canvas.width, Math.random() * canvas.height * 0.7);
        }
        particles = particles.filter(p => p.life > 0.02);
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.05; // 重力
          p.life -= 0.012;
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        animationId = requestAnimationFrame(animate);
      }
      animate();
    }

    function stopFireworks() {
      fireworksActive = false;
      if (animationId) cancelAnimationFrame(animationId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.style.display = 'none';
      congratsOverlay.style.display = 'none';
    }

    // 按鈕事件
    levelButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (gameCompleted) return;
        const level = parseInt(e.currentTarget.dataset.level, 10);
        if (level !== currentLevel) switchLevel(level);
      });
    });

    checkBtn.addEventListener('click', checkPattern);
    clearBtn.addEventListener('click', clearGrid);

    window.addEventListener('dragover', (e) => e.preventDefault());
    window.addEventListener('drop', (e) => e.preventDefault());

    // 初始化
    function initGame() {
      currentLevel = 1;
      gridValues = new Array(9).fill(null);
      gameCompleted = false;
      stopFireworks(); // 確保煙火隱藏
      renderSourceIcons();
      renderGrid();
      updateLevelDisplay();
      updateMessage('🌞 把圖形拖到格子，排成規律吧！');
      levelButtons.forEach(b => b.classList.remove('active'));
      document.querySelector('.level-btn[data-level="1"]').classList.add('active');
    }

    initGame();
  })();
</script>
</body>
</html>
